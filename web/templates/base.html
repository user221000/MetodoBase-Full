<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MetodoBase{% endblock %} — Gestión Nutricional</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:   '#FF6B35',
                        secondary: '#004E89',
                        surface:   '#F9FAFB',
                    }
                }
            }
        }
    </script>
    <!-- Fuente Inter desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-surface min-h-screen font-sans">

    <!-- =========================================================
         NAVBAR
    ========================================================= -->
    <nav class="bg-secondary text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">

                <!-- Logo y nombre -->
                <a href="/" class="flex items-center gap-3 hover:opacity-90 transition-opacity">
                    <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center font-bold text-white text-sm shadow">
                        MB
                    </div>
                    <span class="text-xl font-bold tracking-tight">MetodoBase</span>
                    <span class="hidden sm:inline text-xs text-blue-200 bg-blue-800 px-2 py-0.5 rounded-full">Web v2</span>
                </a>

                <!-- Navegación principal -->
                <div class="hidden md:flex items-center gap-1">
                    <a href="/"
                       class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                              hover:bg-white/10 {% if request.url.path == '/' %}bg-white/20{% endif %}">
                        📊 Dashboard
                    </a>
                    <a href="/clientes"
                       class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                              hover:bg-white/10 {% if request.url.path == '/clientes' %}bg-white/20{% endif %}">
                        👥 Clientes
                    </a>
                    <a href="/generar-plan"
                       class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-colors
                              hover:bg-white/10 {% if request.url.path == '/generar-plan' %}bg-white/20{% endif %}">
                        📋 Generar Plan
                    </a>
                </div>

                <!-- Menú móvil toggle -->
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-white/10 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>

            <!-- Menú móvil expandible -->
            <div id="mobile-menu" class="hidden md:hidden pb-3">
                <a href="/" class="block px-4 py-2 text-sm rounded-lg hover:bg-white/10">📊 Dashboard</a>
                <a href="/clientes" class="block px-4 py-2 text-sm rounded-lg hover:bg-white/10">👥 Clientes</a>
                <a href="/generar-plan" class="block px-4 py-2 text-sm rounded-lg hover:bg-white/10">📋 Generar Plan</a>
            </div>
        </div>
    </nav>

    <!-- =========================================================
         CONTENIDO PRINCIPAL
    ========================================================= -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- =========================================================
         TOAST NOTIFICATIONS
    ========================================================= -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- =========================================================
         SCRIPTS BASE
    ========================================================= -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        // Toggle menú móvil
        document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
            document.getElementById('mobile-menu')?.classList.toggle('hidden');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
