<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Método Base</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; position: relative; }
    .bg-depth {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle at 40% 40%, rgba(251, 191, 36, 0.02) 0%, transparent 40%),
        radial-gradient(circle at 60% 60%, rgba(45, 212, 191, 0.04) 0%, transparent 45%);
    }
    .checkout-input:focus {
      border-color: rgba(251, 191, 36, 0.35) !important;
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.06) !important;
    }
    .btn-stripe-hover:hover {
      box-shadow: 0 6px 20px rgba(251, 191, 36, 0.18) !important;
    }
    .btn-mp-hover:hover {
      background: rgba(45, 212, 191, 0.06) !important;
      border-color: rgba(45, 212, 191, 0.5) !important;
    }
  </style>
</head>
<body class="min-h-screen flex items-center" style="background:#0C0B09;color:#EEEEF2;">
  <div class="bg-depth"></div>
  <div class="max-w-lg mx-auto px-6 py-16 w-full relative z-10">

    <h1 class="text-3xl font-bold mb-2 text-center" style="color:#EEEEF2;">Completa tu Compra</h1>
    <p id="plan-label" class="text-center mb-8" style="color:#8b8d95;">Plan Profesional — $59 USD/mes</p>

    <form id="checkout-form" class="rounded-2xl p-8 space-y-6"
          style="background:rgba(22,23,28,0.85);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);">

      <div>
        <label class="block text-sm mb-1" style="color:#8b8d95;" for="email">Correo electrónico</label>
        <input id="email" type="email" required
               class="w-full px-4 py-3 rounded-xl outline-none transition checkout-input"
               style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#EEEEF2;"
               placeholder="tu@email.com">
      </div>

      <div>
        <label class="block text-sm mb-1" style="color:#8b8d95;" for="nombre">Nombre o razón social</label>
        <input id="nombre" type="text" required
               class="w-full px-4 py-3 rounded-xl outline-none transition checkout-input"
               style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#EEEEF2;"
               placeholder="Nombre de tu negocio">
      </div>

      <div>
        <label class="block text-sm mb-2" style="color:#8b8d95;">Método de pago</label>
        <div class="flex gap-3">
          <button type="button" id="btn-stripe"
                  class="flex-1 px-4 py-3 font-bold rounded-xl transition btn-stripe-hover"
                  style="background:linear-gradient(135deg,#FBBF24,#D97706);color:#0C0B09;box-shadow:0 4px 12px rgba(251,191,36,0.10);">
            💳 Tarjeta (Stripe)
          </button>
          <button type="button" id="btn-mp"
                  class="flex-1 px-4 py-3 font-bold rounded-xl transition btn-mp-hover"
                  style="border:2px solid rgba(45,212,191,0.3);color:#2DD4BF;background:transparent;">
            🟦 MercadoPago
          </button>
        </div>
      </div>

      <p id="error-msg" class="text-sm hidden" style="color:#F87171;"></p>
    </form>

    <p class="text-center text-sm mt-6" style="color:#555860;">
      Los pagos se procesan de forma segura. No almacenamos datos de tarjeta.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const plan = params.get("plan") || "gym_comercial";
    const planes = {
      standard:      { label: "Standard",      precio: 159  },
      gym_comercial: { label: "Gym Comercial", precio: 479  },
      clinica:       { label: "Clínica",       precio: 979  },
    };
    const info = planes[plan] || planes.gym_comercial;
    document.getElementById("plan-label").textContent = `Plan ${info.label} — $${info.precio} MXN/mes`;

    async function iniciarPago(proveedor) {
      const email = document.getElementById("email").value.trim();
      const errorEl = document.getElementById("error-msg");
      errorEl.classList.add("hidden");
      if (!email) { errorEl.textContent = "Ingresa tu correo electrónico."; errorEl.classList.remove("hidden"); return; }
      const endpoint = proveedor === "stripe" ? "/api/pagos/stripe/session" : "/api/pagos/mp/preference";
      try {
        const res = await fetch(endpoint, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ plan, email, success_url: window.location.origin + "/checkout/success", cancel_url: window.location.origin + "/checkout?plan=" + plan }),
        });
        if (!res.ok) { const data = await res.json(); throw new Error(data.detail || "Error al procesar el pago."); }
        const data = await res.json();
        window.location.href = data.redirect_url;
      } catch (err) { errorEl.textContent = err.message; errorEl.classList.remove("hidden"); }
    }
    document.getElementById("btn-stripe").addEventListener("click", () => iniciarPago("stripe"));
    document.getElementById("btn-mp").addEventListener("click", () => iniciarPago("mp"));
  </script>
</body>
</html>
